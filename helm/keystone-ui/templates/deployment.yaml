{{- if .Values.roles }}
# ── Multi-Role: one Deployment per enabled role ──────────────────────
{{- range $roleName, $role := .Values.roles }}
{{- if $role.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keystone-ui.fullname" $ }}-{{ $roleName }}
  labels:
    {{- include "keystone-ui.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $roleName }}
spec:
  replicas: {{ $role.replicaCount | default $.Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "keystone-ui.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $roleName }}
  template:
    metadata:
      labels:
        {{- include "keystone-ui.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $roleName }}
    spec:
      serviceAccountName: {{ include "keystone-ui.serviceAccountName" $ }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $roleName }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- if $role.port }}
          ports:
            - name: http
              containerPort: {{ $role.port }}
              protocol: TCP
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "keystone-ui.fullname" $ }}
            {{- if $role.env }}
            - configMapRef:
                name: {{ include "keystone-ui.fullname" $ }}-{{ $roleName }}
            {{- end }}
          {{- if $role.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ $role.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ $role.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml (default $.Values.resources $role.resources) | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
{{- end }}
{{- else }}
# ── Single-Role: standard single Deployment ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keystone-ui.fullname" . }}
  labels:
    {{- include "keystone-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "keystone-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keystone-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "keystone-ui.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keystone-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "keystone-ui.fullname" . }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
