# ExternalSecret — syncs a Secrets Manager secret into a K8s Secret.
# Only created if externalSecret.enabled is true (disabled for keystone-ui — no DB).
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "keystone-ui.fullname" . }}-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keystone-ui.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.dbSecret.name }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.secretArn | quote }}
{{- end }}
