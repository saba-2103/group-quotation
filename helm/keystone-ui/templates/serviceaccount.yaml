{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "keystone-ui.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keystone-ui.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.irsaRoleArn .Values.serviceAccount.annotations }}
  annotations:
    {{- if .Values.serviceAccount.irsaRoleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.irsaRoleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
