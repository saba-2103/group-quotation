# SecretStore — namespace-scoped, authenticates via ServiceAccount (IRSA).
# Disabled for keystone-ui (no database).
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecret.secretStoreRef.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keystone-ui.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecret.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "keystone-ui.serviceAccountName" . }}
{{- end }}
