{{- if .Values.ingress.enabled }}
{{- if .Values.roles }}
# ── Multi-Role: Ingress for roles with ingress: true ─────────────────
{{- range $roleName, $role := .Values.roles }}
{{- if and $role.enabled $role.port (default false $role.ingress) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "keystone-ui.fullname" $ }}-{{ $roleName }}
  labels:
    {{- include "keystone-ui.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $roleName }}
  annotations:
    {{- toYaml $.Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  rules:
    - host: {{ $.Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "keystone-ui.fullname" $ }}-{{ $roleName }}
                port:
                  number: {{ $.Values.service.port }}
{{- end }}
{{- end }}
{{- else }}
# ── Single-Role ─────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "keystone-ui.fullname" . }}
  labels:
    {{- include "keystone-ui.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "keystone-ui.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- end }}
