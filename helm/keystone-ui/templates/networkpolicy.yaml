{{- if .Values.networkPolicy.enabled }}
{{- if .Values.roles }}
# ── Multi-Role: per-role NetworkPolicy ───────────────────────────────
{{- range $roleName, $role := .Values.roles }}
{{- if $role.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "keystone-ui.fullname" $ }}-{{ $roleName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "keystone-ui.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $roleName }}
spec:
  podSelector:
    matchLabels:
      {{- include "keystone-ui.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $roleName }}
  policyTypes:
    - Ingress
    - Egress
  {{- if $role.port }}
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ $role.port }}
          protocol: TCP
  {{- end }}
  egress:
    - {}  # allow all outbound (DB, Kafka, Secrets Manager, DNS, etc.)
{{- end }}
{{- end }}
{{- else }}
# ── Single-Role ─────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "keystone-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keystone-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "keystone-ui.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - {}  # allow all outbound (DB, Secrets Manager, DNS, etc.)
{{- end }}
{{- end }}
