replicaCount: 2

image:
  # repository and tag are both overridden at deploy time by the CI/CD pipeline:
  #   --set image.repository=<ecr_registry>/<ecr_repository>
  #   --set image.tag=<commit-sha>
  # EKS nodes authenticate to ECR via IRSA — no imagePullSecrets needed.
  repository: 149916142454.dkr.ecr.ap-south-1.amazonaws.com/anaira/keystone-ui
  pullPolicy: Always
  tag: ""  # overridden at deploy time with commit SHA

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: alb
  host: keystone-ui.anairacloud.com
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:149916142454:certificate/d9beec9e-abdc-4e48-9e3b-b8e3d150e5ba
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    external-dns.alpha.kubernetes.io/hostname: keystone-ui.anairacloud.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1536Mi

env: {}
  # Populated by Step 6 (Application Config Review).
  # Base values.yaml keeps env empty — env-specific vars go in values-{env}.yaml.

serviceAccount:
  create: true
  # Leave empty so the SA name falls back to the release-scoped
  # `keystone-ui.fullname` — `keystone-ui` for the canonical release,
  # `keystone-ui-pr-<N>` for per-PR previews. Do NOT hardcode a fixed name:
  # preview releases share the `dev` namespace, and a fixed SA name makes them
  # collide on Helm resource ownership (only the first release can own it).
  name: ""
  # Set to the IRSA role ARN from Terraform (leave empty if no IRSA needed)
  irsaRoleArn: ""
  # Set true only if the app itself calls the K8s API (e.g., leader election)
  automountServiceAccountToken: false
  annotations: {}

# External Secrets Operator — disabled (no database).
externalSecret:
  enabled: false
  region: ap-south-1
  secretArn: ""
  secretStoreRef:
    name: keystone-ui-secret-store
    kind: SecretStore

dbSecret:
  name: keystone-ui-db-secret

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

networkPolicy:
  enabled: true
