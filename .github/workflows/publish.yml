name: Publish Image to ECR

on:
  push:
    branches:
      - main
      - feat/new-buisiness
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.STAGING_AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.ECR_AWS_REGION }}
          role-session-name: gh-${{ github.repository_id }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: image-tag
        env:
          # On pull_request, GITHUB_REF points at refs/pull/<n>/merge and
          # GITHUB_SHA is the merge commit. Fall back to the head ref/sha so
          # the image tag is the actual branch + commit being built.
          RAW_BRANCH: ${{ github.head_ref || github.ref_name }}
          RAW_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          BRANCH_NAME=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9]/-/g')
          SHORT_SHA=$(echo "$RAW_SHA" | cut -c1-8)
          IMAGE_TAG="${BRANCH_NAME}_${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "FULL_IMAGE=${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image-tag.outputs.FULL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed to: ${{ steps.image-tag.outputs.FULL_IMAGE }}"
          echo "::notice title=Published Image::${{ steps.image-tag.outputs.FULL_IMAGE }}"
