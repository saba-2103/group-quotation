name: CI/CD - Build, Push, Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "context/**"
      - "proposals/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "context/**"
      - "proposals/**"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  pull-requests: write # for posting preview-URL comments on PRs

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.IMAGE_TAG }}
      full_image: ${{ steps.image-tag.outputs.FULL_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.STAGING_AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.ECR_AWS_REGION }}
          role-session-name: gh-${{ github.repository_id }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: image-tag
        env:
          # On pull_request events GITHUB_REF is refs/pull/<n>/merge and
          # GITHUB_SHA is the merge commit. Fall back to the head ref/sha so
          # the tag reflects the actual branch + commit being built.
          RAW_BRANCH: ${{ github.head_ref || github.ref_name }}
          RAW_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          BRANCH_NAME=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9]/-/g')
          SHORT_SHA=$(echo "$RAW_SHA" | cut -c1-8)
          IMAGE_TAG="${BRANCH_NAME}_${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "FULL_IMAGE=${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image-tag.outputs.FULL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed to: ${{ steps.image-tag.outputs.FULL_IMAGE }}"
          echo "::notice title=Published Image::${{ steps.image-tag.outputs.FULL_IMAGE }}"

  # Deploys main → canonical URL https://keystone-ui-dev.anairacloud.com
  # Gate derives the canonical branch from the repository's default_branch so
  # renaming main → trunk would not require a workflow edit.
  deploy-canonical:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy via Helm (canonical)
        run: |
          helm upgrade --install keystone-ui ./helm/keystone-ui \
            --namespace dev-env \
            -f ./helm/keystone-ui/values-dev.yaml \
            --set image.tag=${{ needs.build.outputs.image_tag }}

      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://keystone-ui-dev.anairacloud.com/)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"

  # Deploys each open PR to its own host
  # https://keystone-ui-pr-<N>.anairacloud.com
  # Cleanup happens in .github/workflows/preview-cleanup.yml when the PR closes.
  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      RELEASE_NAME: keystone-ui-pr-${{ github.event.pull_request.number }}
      PREVIEW_HOST: keystone-ui-pr-${{ github.event.pull_request.number }}.anairacloud.com
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy preview via Helm
        run: |
          helm upgrade --install "$RELEASE_NAME" ./helm/keystone-ui \
            --namespace dev-env \
            -f ./helm/keystone-ui/values-dev.yaml \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set ingress.hosts[0].host="$PREVIEW_HOST"

      - name: Smoke test
        id: smoke
        continue-on-error: true # don't fail the PR if DNS isn't wildcarded yet
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$PREVIEW_HOST/")
          echo "smoke_status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "Preview returned HTTP $STATUS (may indicate wildcard DNS not yet configured)"
            exit 1
          fi
          echo "Preview live at https://$PREVIEW_HOST/"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            BODY="🚀 **Preview deployed:** https://${PREVIEW_HOST}/
            \`\`\`
            Image:   ${{ needs.build.outputs.full_image }}
            Release: ${RELEASE_NAME} (namespace: dev-env)
            \`\`\`
            This environment is torn down when the PR closes."
          else
            BODY="⚠️ **Preview helm-deployed but smoke test failed** (HTTP ${{ steps.smoke.outputs.smoke_status }}).
            URL: https://${PREVIEW_HOST}/
            \`\`\`
            Image:   ${{ needs.build.outputs.full_image }}
            Release: ${RELEASE_NAME} (namespace: dev-env)
            \`\`\`
            Most likely cause on first PR: wildcard DNS \`*.anairacloud.com\` not yet pointed at the shared ALB. Ping infra to add the Route53 record."
          fi
          gh pr comment "$PR_NUMBER" --body "$BODY"
