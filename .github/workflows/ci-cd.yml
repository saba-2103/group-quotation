# .github/workflows/ci-cd.yml
name: "Keystone UI — CI/CD Pipeline"

on:
  push:
    branches: [dev, develop, main]
    paths:
      - "**"
      - "!**/*.md"
      - "!docs/**"
      - "!context/**"
      - "!proposals/**"
      - "!agent_logs/**"
  pull_request:
    branches: [dev, develop, main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write
  security-events: write
  pull-requests: write   # deploy-preview posts a preview URL comment

jobs:
  # ──────────────────────────────────────────────
  # Pre-commit checks
  # ──────────────────────────────────────────────
  pre-commit:
    uses: Anaira-AI/devops-platform/.github/workflows/01-pre-commit-checks.yml@main
    secrets: inherit

  # ──────────────────────────────────────────────
  # CI Pipeline — build, scan, image push
  # ──────────────────────────────────────────────
  ci:
    needs: pre-commit
    uses: Anaira-AI/devops-platform/.github/workflows/02-ci-pipeline.yml@main
    with:
      language: javascript
      node_version: "24"
      build_command: "npm ci && npm run build"
      test_command: "npm ci && npm test -- --coverage"
      coverage_command: ""
      codeql_language: javascript
      artifact_path: ".next/standalone/**"
      dockerfile_context: "."
      dockerfile_path: "Dockerfile"
      ecr_registry: "149916142454.dkr.ecr.ap-south-1.amazonaws.com"
      ecr_repository: "anaira/keystone-ui"
      helm_chart_path: "./helm/keystone-ui"
      helm_values_files: "values-dev.yaml"
      sonar_coverage_report: "coverage/lcov.info"
    secrets: inherit

  # ──────────────────────────────────────────────
  # E2E — Playwright subset run against the REAL dev backend (proxy mode).
  # GROUP_PAS_BACKEND_URL points /api/{quotation,issuance,policy-admin} at the
  # live group-pas-dev API, so these tests catch *backend contract drift* — the
  # frontend's API assumptions vs the actual responses — before a release.
  # (Mocks would only test the frontend against its own assumptions.)
  # Read-only suites only, so they don't pollute shared dev data:
  #   • schema-coherence — backend-independent; validates every detail/tab
  #     schema's role × state × action graph (the schema-driven backbone).
  #   • smoke — every route loads per role (no console errors), every backend
  #     search endpoint reachable through the proxy.
  #   • role-rbac — PROP-0009 6-persona menu filtering + switcher.
  #   • list-pages — every list renders real backend rows + row→detail nav.
  # Mutating suites (seed-portal, narrative create-quote walkthroughs) stay
  # manual — run them with `npx playwright test` against a disposable backend.
  # ──────────────────────────────────────────────
  e2e:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start app (real dev backend) and run read-only e2e subset
        env:
          # Real dev backend → catches contract drift. Override with the
          # GROUP_PAS_BACKEND_URL_DEV repo variable; falls back to the dev URL.
          GROUP_PAS_BACKEND_URL: ${{ vars.GROUP_PAS_BACKEND_URL_DEV || 'https://group-pas-dev.anairacloud.com' }}
        run: |
          npm run dev > /tmp/dev.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/ >/dev/null 2>&1 && break
            sleep 2
          done
          if ! curl -sf http://localhost:3000/ >/dev/null 2>&1; then
            echo "::error::dev server failed to start"; cat /tmp/dev.log; exit 1
          fi
          PLAYWRIGHT_BASE_URL=http://localhost:3000 npx playwright test \
            tests/e2e/schema-coherence.spec.ts \
            tests/e2e/smoke.spec.ts \
            tests/e2e/role-rbac.spec.ts \
            tests/e2e/list-pages.spec.ts
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Deploy to Dev — only on push to dev/develop
  # ──────────────────────────────────────────────
  deploy-dev:
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/develop')
    uses: Anaira-AI/devops-platform/.github/workflows/03-deploy-dev.yml@main
    with:
      image_tag: ${{ needs.ci.outputs.image_tag }}
      image_repository: ${{ needs.ci.outputs.image_repository }}
      helm_chart_path: "./helm/keystone-ui"
      helm_values_file: "./helm/keystone-ui/values-dev.yaml"
      helm_release_name: "keystone-ui"
      health_check_path: "/"
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy preview — per-PR ephemeral environment.
  # Each open PR gets its own helm release + ingress host:
  #   https://keystone-ui-pr-<N>.anairacloud.com
  # Cleanup is handled by .github/workflows/preview-cleanup.yml on PR close.
  #
  # This is a sibling to platform deploy-dev (Option A: kept local rather than
  # turned into a reusable workflow). Promote to platform 04-deploy-preview.yml
  # once a second service asks for the same pattern.
  # ──────────────────────────────────────────────
  deploy-preview:
    needs: ci
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      RELEASE_NAME: keystone-ui-pr-${{ github.event.pull_request.number }}
      PREVIEW_HOST: keystone-ui-pr-${{ github.event.pull_request.number }}.anairacloud.com
      IMAGE_TAG: ${{ needs.ci.outputs.image_tag }}
      IMAGE_REPOSITORY: ${{ needs.ci.outputs.image_repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Configure AWS credentials (EKS deploy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ap-south-1

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME_DEV }} --region ap-south-1

      - name: Deploy preview via Helm
        run: |
          helm upgrade --install "$RELEASE_NAME" ./helm/keystone-ui \
            --namespace ${{ vars.DEV_NAMESPACE }} \
            --create-namespace \
            --values ./helm/keystone-ui/values-dev.yaml \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --set "ingress.host=$PREVIEW_HOST" \
            --set "ingress.annotations.external-dns\.alpha\.kubernetes\.io/hostname=$PREVIEW_HOST" \
            --wait --timeout 5m

      - name: Smoke test preview
        id: smoke
        continue-on-error: true   # don't fail the PR if DNS hasn't propagated
        run: |
          # Retry up to ~60s — ALB target-group warmup + ExternalDNS lag.
          STATUS=000
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 10 "https://$PREVIEW_HOST/" || echo "000")
            if [ "$STATUS" = "200" ]; then break; fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "smoke_status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "Preview returned HTTP $STATUS after retries"
            exit 1
          fi
          echo "Preview live at https://$PREVIEW_HOST/"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          SMOKE_STATUS: ${{ steps.smoke.outputs.smoke_status }}
        run: |
          # printf-based body so the markdown fence renders cleanly (CommonMark
          # forbids leading-indent code fences > 3 spaces; YAML run-script
          # indent would otherwise break ``` rendering).
          if [ "$SMOKE_OUTCOME" = "success" ]; then
            printf '%s\n\n```\n%s\n%s\n```\n\n%s\n' \
              "🚀 **Preview deployed:** https://${PREVIEW_HOST}/" \
              "Image:   ${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
              "Release: ${RELEASE_NAME} (namespace: ${{ vars.DEV_NAMESPACE }})" \
              "This environment is torn down when the PR closes." > /tmp/pr-body.md
          else
            printf '%s\n%s\n\n```\n%s\n%s\n```\n\n%s\n' \
              "⚠️ **Preview helm-deployed but smoke test failed** (HTTP ${SMOKE_STATUS})." \
              "URL: https://${PREVIEW_HOST}/" \
              "Image:   ${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
              "Release: ${RELEASE_NAME} (namespace: ${{ vars.DEV_NAMESPACE }})" \
              "Most likely cause on first PR: ExternalDNS hasn't propagated the new \`${PREVIEW_HOST}\` record yet. Wait 2-3 minutes and retry, or ping infra." > /tmp/pr-body.md
          fi
          gh pr comment "$PR_NUMBER" --body-file /tmp/pr-body.md
