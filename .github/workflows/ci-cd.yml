# .github/workflows/ci-cd.yml
name: "Keystone UI — CI/CD Pipeline"

on:
  push:
    branches: [dev, develop, main, feat/cicd-skill-trial]
    paths:
      - "**"
      - "!**/*.md"
      - "!docs/**"
      - "!context/**"
      - "!proposals/**"
      - "!agent_logs/**"
  pull_request:
    branches: [dev, develop, main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # Pre-commit checks
  # ──────────────────────────────────────────────
  pre-commit:
    uses: Anaira-AI/devops-platform/.github/workflows/01-pre-commit-checks.yml@main
    secrets: inherit

  # ──────────────────────────────────────────────
  # CI Pipeline — build, scan, image push
  # ──────────────────────────────────────────────
  ci:
    needs: pre-commit
    uses: Anaira-AI/devops-platform/.github/workflows/02-ci-pipeline.yml@main
    with:
      language: javascript
      node_version: "24"
      build_command: "npm ci && npm run build"
      test_command: "npm ci && npm test -- --coverage"
      coverage_command: ""
      codeql_language: javascript
      artifact_path: ".next/standalone/**"
      dockerfile_context: "."
      dockerfile_path: "Dockerfile"
      ecr_registry: "149916142454.dkr.ecr.ap-south-1.amazonaws.com"
      ecr_repository: "anaira/keystone-ui"
      helm_chart_path: "./helm/keystone-ui"
      helm_values_files: "values-dev.yaml"
      sonar_coverage_report: "coverage/lcov.info"
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy to Dev — only on push to dev/develop
  # ──────────────────────────────────────────────
  deploy-dev:
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/develop')
    uses: Anaira-AI/devops-platform/.github/workflows/03-deploy-dev.yml@main
    with:
      image_tag: ${{ needs.ci.outputs.image_tag }}
      image_repository: ${{ needs.ci.outputs.image_repository }}
      helm_chart_path: "./helm/keystone-ui"
      helm_values_file: "./helm/keystone-ui/values-dev.yaml"
      helm_release_name: "keystone-ui"
      health_check_path: "/"
    secrets: inherit
