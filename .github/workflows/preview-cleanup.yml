name: Preview cleanup

# Tears down per-PR preview deploys when the PR closes (merge or abandon).
# Idempotent: we probe with `helm status` and only call `helm uninstall` when
# the release exists, so PRs closed before they ever deployed (or already
# cleaned up) don't fail the workflow.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  id-token: write          # OIDC auth for EKS deploy role
  pull-requests: write

jobs:
  uninstall:
    runs-on: ubuntu-latest
    environment: dev
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      RELEASE_NAME: keystone-ui-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: azure/setup-helm@v4

      - name: Configure AWS credentials (EKS deploy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ap-south-1

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME_DEV }} --region ap-south-1

      - name: Uninstall preview release
        id: uninstall
        run: |
          if helm status "$RELEASE_NAME" -n ${{ vars.DEV_NAMESPACE }} >/dev/null 2>&1; then
            helm uninstall "$RELEASE_NAME" --namespace ${{ vars.DEV_NAMESPACE }}
            echo "removed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $RELEASE_NAME not found (nothing to clean up)."
            echo "removed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment teardown on PR
        if: steps.uninstall.outputs.removed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_NUMBER" --body "🧹 Preview environment \`$RELEASE_NAME\` torn down."
