name: Preview cleanup

# Tears down per-PR preview deploys when the PR closes (merge or abandon).
# Idempotent: we probe with `helm status` and only call `helm uninstall` when
# the release exists, so PRs closed before they ever deployed (or already
# cleaned up) don't fail the workflow.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

env:
  HELM_VERSION: v3.17.3

jobs:
  uninstall:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      RELEASE_NAME: keystone-ui-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Uninstall preview release
        id: uninstall
        run: |
          if helm status "$RELEASE_NAME" -n dev-env >/dev/null 2>&1; then
            helm uninstall "$RELEASE_NAME" --namespace dev-env
            echo "removed=true" >> $GITHUB_OUTPUT
          else
            echo "Release $RELEASE_NAME not found (nothing to clean up)."
            echo "removed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment teardown on PR
        if: steps.uninstall.outputs.removed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_NUMBER" --body "🧹 Preview environment \`$RELEASE_NAME\` torn down."

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f ~/.kube/config
