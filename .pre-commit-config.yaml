repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$|docs/|context/|proposals/|agent_logs/'
      - id: end-of-file-fixer
        exclude: '\.md$|docs/|context/|proposals/|agent_logs/|\.next/'
      - id: check-yaml
        exclude: 'helm/.*/templates/|docs/'
      - id: check-json
        exclude: 'docs/|schemas/.*\.json$'
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3009"]
