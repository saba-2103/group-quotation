# SonarQube project configuration — path-related properties ONLY.
# Auth (projectKey, host.url, login) is managed by the CI pipeline.

# ── Source paths ─────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=src/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# ── Coverage report (JavaScript / TypeScript via lcov) ──────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ── Exclusions ───────────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/dist/**,**/build/**,**/__mocks__/**,**/*.test.ts,**/*.test.tsx
